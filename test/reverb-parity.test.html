<!DOCTYPE html>
<html>
<body>
<script type="module">
import { Context, setSeed } from '../src/context.js';
import { Tensor } from '../src/tensor.js';
import { reverb } from '../src/effects.js';

const DEBUG = false; // Set true to diagnose shader issues.
const canvas = document.createElement('canvas');
const ctx = new Context(canvas, DEBUG);
if (!navigator.gpu) {
  document.body.textContent = 'no webgpu';
} else {
  await ctx.initWebGPU();
  const shape = [4,4,1];
  const baseData = new Float32Array(shape[0]*shape[1]*shape[2]);
  for (let i=0;i<baseData.length;i++) baseData[i] = i / baseData.length;
  const tensorGPU = Tensor.fromArray(ctx, baseData, shape);
  const tensorCPU = Tensor.fromArray(null, baseData, shape);
  let ok = true;
  const tol = 1e-3;
  for (const ridges of [false, true]) {
    for (const octaves of [1, 3]) {
      for (const iterations of [1, 2]) {
        setSeed(42);
        const outGPU = await reverb(tensorGPU, shape, 0, 1, octaves, iterations, ridges);
        setSeed(42);
        const outCPU = await reverb(tensorCPU, shape, 0, 1, octaves, iterations, ridges);
        const arrGPU = await outGPU.read();
        const arrCPU = await outCPU.read();
        for (let i=0;i<arrCPU.length;i++) {
          if (Math.abs(arrCPU[i] - arrGPU[i]) > tol) { ok = false; break; }
        }
        if (!ok) break;
      }
      if (!ok) break;
    }
    if (!ok) break;
  }
  document.body.textContent = ok ? 'reverb parity ok' : 'reverb parity fail';
}
</script>
</body>
</html>
