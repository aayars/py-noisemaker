<!DOCTYPE html>
<html>
<body>
<script type="module">
import { Context, setSeed } from '../src/context.js';
import { Tensor } from '../src/tensor.js';
import { vortex } from '../src/effects.js';

const canvas = document.createElement('canvas');
const ctx = new Context(canvas);
if (!navigator.gpu) {
  document.body.textContent = 'no webgpu';
} else {
  await ctx.initWebGPU();
  const shape = [4,4,1];
  const data = new Float32Array(shape[0]*shape[1]*shape[2]);
  for (let i=0;i<data.length;i++) data[i] = i / data.length;
  const tensorGPU = Tensor.fromArray(ctx, data, shape);
  const tensorCPU = Tensor.fromArray(null, data, shape);
  setSeed(123);
  const outGPU = await vortex(tensorGPU, shape, 0, 1, 64);
  const arrGPU = await outGPU.read();
  setSeed(123);
  const outCPU = await vortex(tensorCPU, shape, 0, 1, 64);
  const arrCPU = await outCPU.read();
  let ok = true;
  const tol = 1e-3;
  for (let i=0;i<arrCPU.length;i++) {
    if (Math.abs(arrCPU[i] - arrGPU[i]) > tol) { ok = false; break; }
  }
  document.body.textContent = ok ? 'vortex parity ok' : 'vortex parity fail';
}
</script>
</body>
</html>
