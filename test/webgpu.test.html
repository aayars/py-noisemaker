<!DOCTYPE html>
<html>
<body>
<script type="module">
import { Context } from '../src/context.js';
import { basic } from '../src/generators.js';
import { voronoi } from '../src/effects.js';
import { blend } from '../src/value.js';
import { DistanceMetric } from '../src/constants.js';
const canvas = document.createElement('canvas');
const ctx = new Context(canvas);
if (!navigator.gpu) {
  document.body.textContent = 'no webgpu';
} else {
  await ctx.initWebGPU();
  let ok = true;
  const base = basic(2, [4,4,1], { ctx });
  const out = await voronoi(base, [4,4,1], 0, 0, undefined, 0, DistanceMetric.triangular);
  const arr = await out.read();
  if (arr.length !== 16) ok = false;

  const a = basic(2, [2,2,1], { ctx });
  const b = basic(4, [2,2,1], { ctx });
  const blended = await blend(a, b, 0.5);
  const da = await a.read();
  const db = await b.read();
  const blendArr = await blended.read();
  for (let i = 0; i < blendArr.length; i++) {
    if (Math.abs(blendArr[i] - (da[i] + db[i]) * 0.5) > 1e-6) {
      ok = false;
      break;
    }
  }

  document.body.textContent = ok ? 'webgpu ok' : 'webgpu fail';
}
</script>
</body>
</html>
