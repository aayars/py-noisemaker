<!DOCTYPE html>
<html>
<body>
<script type="module">
import { Context, setSeed } from '../src/context.js';
import { values, downsample, upsample, blend, sobel, refract } from '../src/value.js';
import { Tensor } from '../src/tensor.js';
import { adjustBrightness, adjustContrast, vignette, reindex, dither, grain, crt, wobble, grime, vaseline, dla, tint } from '../src/effects.js';
import { InterpolationType } from '../src/constants.js';
const canvas = document.createElement('canvas');
const ctx = new Context(canvas);
const cpuCtx = new Context(null);
if (!navigator.gpu) {
  document.body.textContent = 'no webgpu';
  throw new Error('navigator.gpu unavailable');
}
await ctx.initWebGPU();
let ok = true;
function nearly(a, b, eps = 1e-3) { return Math.abs(a - b) < eps; }
function testEffect(fn, args = [], time = 0, speed = 0) {
  const shape = [2,2,3];
  const base = values(1, shape, { seed: 1, ctx: cpuCtx }).read();
  const cpuBase = Tensor.fromArray(cpuCtx, base, shape);
  const gpuBase = Tensor.fromArray(ctx, base, shape);
  const cpu = fn(cpuBase, shape, time, speed, ...args).read();
  const gpu = fn(gpuBase, shape, time, speed, ...args).read();
  if (cpu.length !== gpu.length) return false;
  for (let i = 0; i < cpu.length; i++) {
    if (!nearly(cpu[i], gpu[i])) return false;
  }
  return true;
}

async function testTint() {
  const shape3 = [4,4,3];
  const baseTensor3 = await values(2, shape3, { seed: 1, ctx: cpuCtx });
  const baseArr3 = await baseTensor3.read();
  const cpuBase3 = Tensor.fromArray(cpuCtx, baseArr3, shape3);
  const gpuBase3 = Tensor.fromArray(ctx, baseArr3, shape3);
  setSeed(1);
  const cpuOut3 = await tint(cpuBase3, shape3, 0, 1, 0.5);
  const cpuArr3 = await cpuOut3.read();
  setSeed(1);
  const gpuOut3 = await tint(gpuBase3, shape3, 0, 1, 0.5);
  const gpuArr3 = await gpuOut3.read();
  if (cpuArr3.length !== gpuArr3.length) return false;
  for (let i = 0; i < cpuArr3.length; i++) {
    if (!nearly(cpuArr3[i], gpuArr3[i])) return false;
  }
  const shape4 = [4,4,4];
  const baseTensor4 = await values(2, shape4, { seed: 1, ctx: cpuCtx });
  const baseArr4 = await baseTensor4.read();
  const cpuBase4 = Tensor.fromArray(cpuCtx, baseArr4, shape4);
  const gpuBase4 = Tensor.fromArray(ctx, baseArr4, shape4);
  setSeed(1);
  const cpuOut4 = await tint(cpuBase4, shape4, 0, 1, 0.5);
  const cpuArr4 = await cpuOut4.read();
  setSeed(1);
  const gpuOut4 = await tint(gpuBase4, shape4, 0, 1, 0.5);
  const gpuArr4 = await gpuOut4.read();
  if (cpuArr4.length !== gpuArr4.length) return false;
  for (let i = 0; i < cpuArr4.length; i++) {
    if (!nearly(cpuArr4[i], gpuArr4[i])) return false;
  }
  return true;
}
setSeed(1);

const base = await values(2, [4,4,1], { seed: 1, ctx });
const down = await downsample(base, 2);
const up = await upsample(down, 2);
const mix = await blend(base, base, 0.5);
const edge = await sobel(base);
const baseCpu = values(2, [4,4,1], { seed: 1, ctx: cpuCtx }).read();
const baseGpu = await base.read();
if (baseCpu.length !== baseGpu.length) ok = false;
if (ok) {
  for (let i = 0; i < baseCpu.length; i++) {
    if (!nearly(baseCpu[i], baseGpu[i])) { ok = false; break; }
  }
}
function testRefract() {
  const shape = [4,4,1];
  const srcData = values(2, shape, { seed: 1, ctx: cpuCtx });
  const rxData = values(2, shape, { seed: 2, ctx: cpuCtx });
  const ryData = values(2, shape, { seed: 3, ctx: cpuCtx });
  const cpuOut = refract(srcData, rxData, ryData, 0.25, InterpolationType.linear).read();
  const srcGpu = Tensor.fromArray(ctx, srcData.read(), shape);
  const rxGpu = Tensor.fromArray(ctx, rxData.read(), shape);
  const ryGpu = Tensor.fromArray(ctx, ryData.read(), shape);
  const gpuOut = refract(srcGpu, rxGpu, ryGpu, 0.25, InterpolationType.linear).read();
  if (cpuOut.length !== gpuOut.length) return false;
  for (let i = 0; i < cpuOut.length; i++) {
    if (!nearly(cpuOut[i], gpuOut[i])) return false;
  }
  return true;
}

async function testCRT() {
  const shape = [4,4,3];
  for (let seed = 0; seed < 3; seed++) {
    const baseTensor = await values(2, shape, { seed, ctx: cpuCtx });
    const baseArr = await baseTensor.read();
    const cpuBase = Tensor.fromArray(cpuCtx, baseArr, shape);
    const gpuBase = Tensor.fromArray(ctx, baseArr, shape);
    setSeed(seed);
    const cpuOut = await crt(cpuBase, shape, 0, 1);
    const cpuArr = await cpuOut.read();
    setSeed(seed);
    const gpuOut = await crt(gpuBase, shape, 0, 1);
    const gpuArr = await gpuOut.read();
    if (cpuArr.length !== gpuArr.length) return false;
    for (let i = 0; i < cpuArr.length; i++) {
      if (!nearly(cpuArr[i], gpuArr[i])) return false;
    }
  }
  return true;
}

async function testDLA() {
  const shape = [16,16,1];
  const baseTensor = await values(2, shape, { seed: 1, ctx: cpuCtx });
  const baseArr = await baseTensor.read();
  const cpuBase = Tensor.fromArray(cpuCtx, baseArr, shape);
  const gpuBase = Tensor.fromArray(ctx, baseArr, shape);
  setSeed(1);
  const cpuOut = await dla(cpuBase, shape, 1, 1, 2, 0.1, 0.2, null, 1);
  const cpuArr = await cpuOut.read();
  setSeed(1);
  const gpuOut = await dla(gpuBase, shape, 1, 1, 2, 0.1, 0.2, null, 1);
  const gpuArr = await gpuOut.read();
  if (cpuArr.length !== gpuArr.length) return false;
  for (let i = 0; i < cpuArr.length; i++) {
    if (!nearly(cpuArr[i], gpuArr[i])) return false;
  }
  return true;
}
ok = ok &&
  baseGpu.length === 16 &&
  (await down.read()).length === 4 &&
  (await up.read()).length === 16 &&
  (await mix.read()).length === 16 &&
  (await edge.read()).length === 16 &&
  testEffect(adjustBrightness, [0.1]) &&
  testEffect(adjustContrast, [1.2]) &&
  testEffect(grain, [0.25]) &&
  testEffect(dither, [2]) &&
  testEffect(vignette, [0.2, 0.5]) &&
  testEffect(reindex, [0.5]) &&
  testEffect(wobble, [], 0.8, 1) &&
  testEffect(grime) &&
  testEffect(vaseline) &&
  testRefract() &&
  await testTint() &&
  await testCRT() &&
  await testDLA();
document.body.textContent = ok ? 'webgpu ok' : 'webgpu fail';
</script>
</body>
</html>
