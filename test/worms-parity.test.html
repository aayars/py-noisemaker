<!DOCTYPE html>
<html>
<body>
<script type="module">
import { Context, setSeed } from '../src/context.js';
import { Tensor } from '../src/tensor.js';
import { wormsWebGPU, wormsCPU } from '../src/effects.js';
import { WormBehavior } from '../src/constants.js';

const DEBUG = false; // Set true to diagnose shader issues.
const canvas = document.createElement('canvas');
const ctx = new Context(canvas, DEBUG);
if (!navigator.gpu) {
  document.body.textContent = 'no webgpu';
} else {
  await ctx.initWebGPU();
  const shape = [4,4,1];
  const baseData = new Float32Array(shape[0]*shape[1]*shape[2]);
  for (let i=0;i<baseData.length;i++) baseData[i] = i / baseData.length;
  const tensorGPU = Tensor.fromArray(ctx, baseData, shape);
  const tensorCPU = Tensor.fromArray(null, baseData, shape);
  const behavior = WormBehavior.obedient;
  const kink = 1.5;
  const drunkenness = 0.1;
  setSeed(42);
  const outGPU = await wormsWebGPU(tensorGPU, shape, 0, 1, behavior, 4.0, 4.0, 1.0, 0.05, 0.5, kink, drunkenness, false, null);
  setSeed(42);
  const outCPU = await wormsCPU(tensorCPU, shape, 0, 1, behavior, 4.0, 4.0, 1.0, 0.05, 0.5, kink, drunkenness, false, null);
  const arrGPU = await outGPU.read();
  const arrCPU = await outCPU.read();
  let ok = true;
  const tol = 1e-3;
  for (let i=0;i<arrCPU.length;i++) {
    if (Math.abs(arrCPU[i] - arrGPU[i]) > tol) { ok = false; break; }
  }
  document.body.textContent = ok ? 'worms parity ok' : 'worms parity fail';
}
</script>
</body>
</html>
