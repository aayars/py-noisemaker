<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Noisemaker JS Demo</title>
  <link rel="icon" href="data:," />
  <style>
    body {
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: row;
      font-family: sans-serif;
      background: #fafafa;
      color: #333;
    }
    #left,
    #right {
      width: 50%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    #right {
      padding-left: 20px;
    }
    canvas {
      border: 1px solid #ccc;
      margin-top: 20px;
      max-width: 512px;
    }
    button {
      padding: 4px 8px;
    }
    #seedInput {
      width: 128px;
      padding: 4px 8px;
      box-sizing: border-box;
    }
    select {
      width: 256px;
    }
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
      margin-top: 10px;
      margin-bottom: 10px;
    }
    #controls .control-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    #controls .control-group--toggles {
      gap: 12px;
    }
    #controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0;
    }
    #controls button,
    #controls input,
    #controls select {
      margin: 0;
    }
    #controls button {
      width: auto;
    }
    #info {
      margin-top: 20px;
    }
    #status {
      font-size: 14px;
      margin-bottom: 10px;
    }
    #tabs {
      margin-bottom: 10px;
    }
    #tabs button {
      margin-right: 5px;
      padding: 4px 8px;
    }
    #tabs button.active {
      font-weight: bold;
    }
    #presetFormula,
    #presetEvaluated {
      background: #f0f0f0;
      padding: 10px;
      overflow: auto;
      max-height: 600px;
      font-size: 12px;
    }
    #presetEvaluated {
      display: none;
    }
  </style>
</head>
<body>
  <div id="left">
    <h1>Noisemaker JS Demo</h1>
    <div id="controls">
      <div class="control-group control-group--preset">
        <label for="preset">Preset:</label>
        <select id="preset"></select>
      </div>
      <div class="control-group control-group--buttons">
        <button id="randomPreset">Random Preset</button>
        <button id="reroll">Re-roll</button>
      </div>
      <div class="control-group control-group--seed">
        <label for="seedInput">Seed:</label>
        <input id="seedInput" type="number" step="1" value="42" />
      </div>
      <div class="control-group control-group--toggles">
        <label><input type="checkbox" id="webgpuToggle" /> WebGPU</label>
        <label><input type="checkbox" id="animateToggle" disabled /> Animate</label>
      </div>
    </div>
    <canvas id="noise" width="512" height="512"></canvas>
  </div>
  <div id="right">
    <div id="info">
      <div id="tabs">
        <button id="tabFormula" class="active">Formula</button>
        <button id="tabEvaluated">Evaluated</button>
      </div>
      <pre id="presetFormula"></pre>
      <pre id="presetEvaluated"></pre>
      <div style="text-align: right">
        <span id="status"></span>
      </div>
    </div>
    <div id="errorBanner" style="display:none;background:#fee;color:#900;padding:10px;width:100%;box-sizing:border-box;white-space:pre-wrap;"></div>
  </div>
    <script type="module">
    import { Context } from './src/context.js';
    import { render, Preset, gatherStageSnapshots, writeProgramUniforms } from './src/composer.js';
    import { compilePreset } from './src/webgpu/pipeline.js';
    import { ColorSpace } from './src/constants.js';
    import PRESETS from './src/presets.js';
    import { random, setSeed } from './src/util.js';

    const benchmark = window.location.hash.includes('benchmark');

    const errorBannerEl = document.getElementById('errorBanner');

    function showError(message) {
      errorBannerEl.style.display = 'block';
      errorBannerEl.textContent += (errorBannerEl.textContent ? '\n' : '') + message;
    }

    const origConsoleError = console.error.bind(console);
    console.error = (...args) => {
      origConsoleError(...args);
      showError(args.map(String).join(' '));
    };

    console.warn = (...args) => {
      origConsoleError(...args);
      showError(args.map(String).join(' '));
    };

    window.addEventListener('error', (e) => {
      showError(`${e.message}\n${e.error?.stack || ''}`);
    });

    window.addEventListener('unhandledrejection', (e) => {
      const reason = e.reason;
      showError(reason && reason.stack ? `${reason.message}\n${reason.stack}` : String(reason));
    });

    let canvas = document.getElementById('noise');
    let activeCanvasBackend = 'cpu';
    const webgpuToggle = document.getElementById('webgpuToggle');
    const animateToggle = document.getElementById('animateToggle');
    const hasWebGPU = typeof navigator !== 'undefined' && !!navigator.gpu;
    const defaultProfilingOptions = {
      timestampQueries: false,
      dynamicResolution: false,
      parityReadback: false,
    };
    const requestFrame =
      (typeof window !== 'undefined' && window.requestAnimationFrame?.bind(window)) ||
      ((cb) => window.setTimeout(() => cb((performance?.now?.() ?? Date.now())), 16));
    const cancelFrame =
      (typeof window !== 'undefined' && window.cancelAnimationFrame?.bind(window)) ||
      ((handle) => window.clearTimeout(handle));
    const FRAME_INTERVAL_MS = 1000 / 30;
    if (!hasWebGPU) {
      webgpuToggle.checked = false;
      webgpuToggle.disabled = true;
    }
    let ctx;
    let renderQueue = Promise.resolve();
    let animationRunning = false;
    let animationFrameHandle = null;
    let animationStartTime = 0;
    let animationLastFrameTime = 0;
    let animationPendingCount = 0;
    const programCachesByContext = new Map();
    let gpuFrameIndex = 0;
    let lastCanvasSizeKey = `${canvas.width}x${canvas.height}`;
    let currentPreset = null;
    let currentSeed = 42;

    const canvasResizeObserver =
      typeof ResizeObserver !== 'undefined'
        ? new ResizeObserver((entries) => {
            for (const entry of entries) {
              if (entry.target === canvas) {
                handleCanvasResize();
              }
            }
          })
        : null;

    function observeCanvas(target) {
      if (!canvasResizeObserver) {
        lastCanvasSizeKey = `${target?.width ?? canvas.width}x${target?.height ?? canvas.height}`;
        return;
      }
      canvasResizeObserver.disconnect();
      if (target) {
        canvasResizeObserver.observe(target);
        lastCanvasSizeKey = `${target.width}x${target.height}`;
      }
    }

    function ensureCanvasForBackend(backend) {
      if (activeCanvasBackend === backend && canvas?.isConnected) {
        return canvas;
      }
      const newCanvas = canvas.cloneNode(false);
      newCanvas.width = canvas.width;
      newCanvas.height = canvas.height;
      newCanvas.id = canvas.id;
      canvas.parentNode.replaceChild(newCanvas, canvas);
      canvas = newCanvas;
      activeCanvasBackend = backend;
      observeCanvas(canvas);
      return canvas;
    }

    function createCPUContext(targetCanvas) {
      const cpuCtx = new Context(null);
      cpuCtx.canvas = targetCanvas;
      cpuCtx.gpu = null;
      cpuCtx.device = null;
      cpuCtx.queue = null;
      cpuCtx.presentationFormat = null;
      cpuCtx.isCPU = true;
      cpuCtx.forceCPU = true;
      cpuCtx.requireWebGPU = false;
      cpuCtx.profile = {
        webgpu: 0,
        lastGPUTime: 0,
        lastDispatchMs: 0,
        lastCompileMs: 0,
        dynamicScale: 1,
        timestampQueryEnabled: false,
        parityReadback: false,
      };
      if (typeof cpuCtx.setProfilingOptions === 'function') {
        cpuCtx.setProfilingOptions({ ...defaultProfilingOptions });
      } else {
        cpuCtx.profilingOptions = { ...defaultProfilingOptions };
      }
      return cpuCtx;
    }

    function disposeCtx(existingCtx) {
      if (!existingCtx) return;
      try {
        existingCtx.gpu?.unconfigure?.();
      } catch (_) {
        /* ignore */
      }
      try {
        existingCtx.device?.destroy?.();
      } catch (_) {
        /* ignore */
      }
    }

    function destroyProgramEntry(entry) {
      if (!entry) return;
      if (entry.program) {
        if (typeof entry.program.destroy === 'function') {
          try {
            entry.program.destroy();
          } catch (err) {
            void err;
          }
        } else if (typeof entry.program.dispose === 'function') {
          try {
            entry.program.dispose();
          } catch (err) {
            void err;
          }
        }
      }
      entry.program = null;
    }

    function clearProgramCacheForContext(context) {
      if (!context) return;
      const cache = programCachesByContext.get(context);
      if (!cache) return;
      for (const entry of cache.values()) {
        destroyProgramEntry(entry);
      }
      cache.clear();
      programCachesByContext.delete(context);
      if (context === ctx) {
        gpuFrameIndex = 0;
      }
    }

    function applyProfilingOptions(targetCtx = ctx) {
      if (!targetCtx) {
        return;
      }
      const options = { ...defaultProfilingOptions };
      if (typeof targetCtx.setProfilingOptions === 'function') {
        targetCtx.setProfilingOptions(options);
      } else {
        targetCtx.profilingOptions = options;
      }
      if (!targetCtx.profile) {
        targetCtx.profile = {
          webgpu: 0,
          lastGPUTime: 0,
          lastDispatchMs: 0,
          lastCompileMs: 0,
          dynamicScale: 1,
          timestampQueryEnabled: false,
          parityReadback: false,
        };
      } else {
        targetCtx.profile.timestampQueryEnabled = false;
        targetCtx.profile.parityReadback = false;
        if (!Number.isFinite(targetCtx.profile.dynamicScale)) {
          targetCtx.profile.dynamicScale = 1;
        }
      }
    }

    function getProgramSupportInfo(program) {
      const base = {
        gpuStageCount: 0,
        generatorSupported: false,
        hasUnsupported: false,
      };
      if (!program || typeof program.stageCount !== 'number') {
        return { ...base, usable: false };
      }
      const info = { ...base };
      if (typeof program.gpuStageCount === 'number') {
        info.gpuStageCount = Math.max(0, Math.floor(program.gpuStageCount));
      } else {
        for (let i = 0; i < program.stageCount; i += 1) {
          const descriptor = program.getStageDescriptor(i);
          if (!descriptor) continue;
          if (descriptor.gpuSupported !== false) {
            info.gpuStageCount += 1;
          } else {
            info.hasUnsupported = true;
          }
        }
      }
      if (typeof program.generatorStageSupported === 'boolean') {
        info.generatorSupported = program.generatorStageSupported;
      } else {
        for (let i = 0; i < program.stageCount; i += 1) {
          const descriptor = program.getStageDescriptor(i);
          if (descriptor?.stageType === 'generator') {
            info.generatorSupported = descriptor.gpuSupported !== false;
            break;
          }
        }
      }
      if (typeof program.hasUnsupportedStages === 'boolean') {
        info.hasUnsupported = program.hasUnsupportedStages;
      } else if (!info.hasUnsupported) {
        for (let i = 0; i < program.stageCount; i += 1) {
          const descriptor = program.getStageDescriptor(i);
          if (!descriptor) continue;
          if (descriptor.gpuSupported === false) {
            info.hasUnsupported = true;
            break;
          }
        }
      }
      return { ...info, usable: info.generatorSupported && info.gpuStageCount > 0 };
    }

    function ensureProgramForPreset(context, presetObj, width, height) {
      const toggleRequestsWebGPU = Boolean(webgpuToggle?.checked);
      const contextRequiresWebGPU = Boolean(context?.requireWebGPU);
      const contextForcesCPU = Boolean(context?.forceCPU);
      if (!hasWebGPU || (!toggleRequestsWebGPU && !contextRequiresWebGPU)) {
        return null;
      }
      if (!context || context.isCPU || contextForcesCPU) {
        if (contextRequiresWebGPU) {
          throw new Error('WebGPU rendering was requested but the active context is CPU-only.');
        }
        return null;
      }
      let cache = programCachesByContext.get(context);
      if (!cache) {
        cache = new Map();
        programCachesByContext.set(context, cache);
      }
      const key = `${presetObj.name}:${width}x${height}`;
      let entry = cache.get(key);
      if (entry && entry.program && !entry.program.matchesPreset(presetObj)) {
        destroyProgramEntry(entry);
        cache.delete(key);
        entry = null;
      }
      if (!entry) {
        entry = {
          program: null,
          unsupported: false,
          notified: false,
          partial: false,
          support: null,
          partialNotified: false,
        };
        cache.set(key, entry);
      }
      if (!entry.program && !entry.unsupported) {
        try {
          const perfReady = typeof performance !== 'undefined' && performance && performance.now;
          const compileStart = perfReady ? performance.now() : 0;
          const compiled = compilePreset(presetObj, context);
          if (entry) {
            entry.compileMs = perfReady ? performance.now() - compileStart : 0;
          }
          const support = getProgramSupportInfo(compiled);
          if (compiled && support.usable) {
            entry.program = compiled;
            entry.partial = Boolean(support.hasUnsupported);
            entry.support = support;
            if (!entry.partial) {
              entry.partialNotified = false;
            }
          } else {
            entry.unsupported = true;
            entry.partial = false;
            entry.support = support;
            compiled?.destroy?.();
          }
        } catch (err) {
          entry.unsupported = true;
          destroyProgramEntry(entry);
          throw err;
        }
      }
      if (entry?.program) {
        entry.support = getProgramSupportInfo(entry.program);
        entry.partial = Boolean(entry.support?.hasUnsupported);
        if (!entry.partial) {
          entry.partialNotified = false;
        }
      }
      return entry;
    }

    observeCanvas(canvas);

    async function initCtx() {
      await renderQueue;
      const previousCtx = ctx;
      const previousBackend = previousCtx && !previousCtx.isCPU ? 'gpu' : 'cpu';
      const useWebGPU = hasWebGPU && webgpuToggle.checked;
      const targetBackend = useWebGPU ? 'gpu' : 'cpu';
      const targetCanvas = ensureCanvasForBackend(targetBackend);

      let nextCtx = null;
      if (useWebGPU) {
        const gpuCtx = new Context(targetCanvas);
        try {
          const ok = await gpuCtx.initWebGPU();
          if (!ok) {
            throw new Error('WebGPU unavailable or failed to initialize.');
          }
          gpuCtx.requireWebGPU = true;
          gpuCtx.forceCPU = false;
          nextCtx = gpuCtx;
        } catch (e) {
          disposeCtx(gpuCtx);
          if (targetBackend !== previousBackend) {
            ensureCanvasForBackend(previousBackend);
          }
          const err = e instanceof Error ? e : new Error(String(e));
          showError(err.message || 'WebGPU initialization failed.');
          throw err;
        }
      } else {
        nextCtx = createCPUContext(targetCanvas);
      }

      if (previousCtx && previousCtx !== nextCtx) {
        clearProgramCacheForContext(previousCtx);
      }

      ctx = nextCtx;

      if (previousCtx && previousCtx !== ctx) {
        if (typeof previousCtx.destroy === 'function') {
          try {
            previousCtx.destroy({ keepLookupTextures: false });
          } catch (err) {
            void err;
          }
        } else if (typeof previousCtx.dispose === 'function') {
          try {
            previousCtx.dispose({ keepLookupTextures: false });
          } catch (err) {
            void err;
          }
        }
        disposeCtx(previousCtx);
      }
      applyProfilingOptions(ctx);
      if (!ctx.profile) {
        ctx.profile = {
          webgpu: 0,
          lastGPUTime: 0,
          lastDispatchMs: 0,
          lastCompileMs: 0,
          dynamicScale: 1,
          timestampQueryEnabled: false,
          parityReadback: false,
        };
      } else {
        ctx.profile.webgpu = 0;
        ctx.profile.lastGPUTime = 0;
        ctx.profile.lastDispatchMs = 0;
        ctx.profile.lastCompileMs = ctx.profile.lastCompileMs || 0;
        if (!Number.isFinite(ctx.profile.dynamicScale)) {
          ctx.profile.dynamicScale = 1;
        }
        ctx.profile.parityReadback = false;
      }
      gpuFrameIndex = 0;
      return !ctx.isCPU;
    }

    await initCtx();
    const presetSelect = document.getElementById('preset');
    const statusEl = document.getElementById('status');
    const presetFormulaEl = document.getElementById('presetFormula');
    const presetEvalEl = document.getElementById('presetEvaluated');
    const tabFormulaBtn = document.getElementById('tabFormula');
    const tabEvalBtn = document.getElementById('tabEvaluated');
    const seedInput = document.getElementById('seedInput');
    let presets = PRESETS();
    const presetNames = Object.keys(presets).filter(
      (name) => !name.startsWith('maybe-')
    );

    const dslSource = await fetch('./dsl/presets.dsl').then((r) => r.text());

    function extractPresetSource(source, name) {
      const quotedName = `"${name}"`;
      let searchStart = 0;

      while (searchStart < source.length) {
        const nameIdx = source.indexOf(quotedName, searchStart);
        if (nameIdx === -1) {
          return '';
        }

        let idx = nameIdx + quotedName.length;
        while (idx < source.length && /\s/.test(source[idx])) {
          idx++;
        }

        if (idx >= source.length || source[idx] !== ':') {
          searchStart = nameIdx + quotedName.length;
          continue;
        }

        idx++;

        let braceIdx = idx;
        while (braceIdx < source.length) {
          const ch = source[braceIdx];
          if (/\s/.test(ch)) {
            braceIdx++;
            continue;
          }
          if (ch === '/' && source[braceIdx + 1] === '/') {
            braceIdx += 2;
            while (braceIdx < source.length && source[braceIdx] !== '\n') {
              braceIdx++;
            }
            continue;
          }
          if (ch === '/' && source[braceIdx + 1] === '*') {
            braceIdx += 2;
            while (
              braceIdx + 1 < source.length &&
              !(source[braceIdx] === '*' && source[braceIdx + 1] === '/')
            ) {
              braceIdx++;
            }
            if (braceIdx + 1 < source.length) {
              braceIdx += 2;
            }
            continue;
          }
          break;
        }

        if (braceIdx >= source.length || source[braceIdx] !== '{') {
          searchStart = nameIdx + quotedName.length;
          continue;
        }

        let end = braceIdx;
        let depth = 0;
        let inString = false;
        let escaped = false;

        while (end < source.length) {
          const ch = source[end++];

          if (inString) {
            if (escaped) {
              escaped = false;
              continue;
            }
            if (ch === '\\') {
              escaped = true;
            } else if (ch === '"') {
              inString = false;
            }
            continue;
          }

          if (ch === '"') {
            inString = true;
          } else if (ch === '{') {
            depth++;
          } else if (ch === '}') {
            depth--;
            if (depth === 0) {
              return source.slice(nameIdx, end);
            }
          }
        }

        return '';
      }

      return '';
    }

    const presetSource = {};
    for (const name of presetNames) {
      presetSource[name] = extractPresetSource(dslSource, name);
    }

    presetNames.sort().forEach((name) => {
      const option = document.createElement('option');
      option.value = name;
      option.textContent = name;
      presetSelect.appendChild(option);
    });

    function toSnake(str) {
      return str
        .replace(/([A-Z])/g, '_$1')
        .replace(/-/g, '_')
        .toLowerCase();
    }

    function isPlainObject(value) {
      if (!value || typeof value !== 'object') return false;
      const proto = Object.getPrototypeOf(value);
      return proto === Object.prototype || proto === null;
    }

    function toSnakeKeys(value) {
      if (Array.isArray(value)) {
        return value.map((item) => toSnakeKeys(item));
      }
      if (isPlainObject(value)) {
        const out = {};
        for (const [k, v] of Object.entries(value)) {
          out[toSnake(k)] = toSnakeKeys(v);
        }
        return out;
      }
      return value;
    }

    function formatPreset(obj, indent = 0) {
      const pad = '  '.repeat(indent);
      if (typeof obj === 'function') {
        if (obj.length === 0) {
          try {
            const result = obj();
            if (result && typeof result === 'object') {
              return formatPreset(result, indent);
            }
          } catch (e) {
            // ignore invocation failures
          }
        }
        return obj.toString();
      }
      if (obj && typeof obj === 'object') {
        if (Array.isArray(obj)) {
          return (
            '[\n' +
            obj
              .map((v) => pad + '  ' + formatPreset(v, indent + 1))
              .join(',\n') +
            '\n' +
            pad +
            ']'
          );
        }
        return (
          '{\n' +
          Object.entries(obj)
            .map(
              ([k, v]) => pad + '  ' + JSON.stringify(k) + ': ' + formatPreset(v, indent + 1)
            )
            .join(',\n') +
          '\n' +
          pad +
          '}'
        );
      }
      return JSON.stringify(obj);
    }

    function serializePreset(preset, seed) {
      const toPlainObject = (obj) =>
        Object.fromEntries(Object.entries(obj || {}));
      const toPlain = (effects) =>
        effects.map((fn) => ({
          effect: toSnake(fn.__effectName || fn.name || 'fn'),
          ...toSnakeKeys(fn.__params || {}),
        }));
      const rawSettings = toPlainObject(preset.settings);
      const rawGenerator = toPlainObject(preset.generator);
      const settings = toSnakeKeys(rawSettings);
      const generator = toSnakeKeys(rawGenerator);
      const merged = { ...settings, ...generator };
      const colorSpace =
        rawGenerator.color_space ??
        rawGenerator.colorSpace ??
        rawSettings.color_space ??
        rawSettings.colorSpace ??
        ColorSpace.hsv;
      merged.color_space = colorSpace;
      if (seed !== undefined) {
        merged.seed = seed;
      }
      return {
        settings: merged,
        generator,
        octaves: toPlain(preset.octave_effects),
        post: toPlain(preset.post_effects),
        final: toPlain(preset.final_effects),
      };
    }

    function showTab(which) {
      const formula = which === 'formula';
      presetFormulaEl.style.display = formula ? 'block' : 'none';
      presetEvalEl.style.display = formula ? 'none' : 'block';
      tabFormulaBtn.classList.toggle('active', formula);
      tabEvalBtn.classList.toggle('active', !formula);
    }

    tabFormulaBtn.addEventListener('click', () => showTab('formula'));
    tabEvalBtn.addEventListener('click', () => showTab('evaluated'));

    presetSelect.value = 'basic';
    currentPreset = presetSelect.value;
    currentSeed = Number(seedInput.value) || 42;
    seedInput.value = currentSeed;

    function parseSeed(value) {
      const num = Number(value);
      return Number.isFinite(num) ? Math.trunc(num) : currentSeed;
    }

    async function draw(seed, presetName, timeSeconds = null) {
      let activeCtx = ctx;
      const wantsWebGPUFromToggle = hasWebGPU && Boolean(webgpuToggle?.checked);
      const contextRequiresWebGPU = Boolean(activeCtx?.requireWebGPU);
      const contextInitiallyForceCPU = Boolean(activeCtx?.forceCPU);
      const wantsWebGPU = contextRequiresWebGPU || wantsWebGPUFromToggle;
      if (activeCtx) {
        if (wantsWebGPU) {
          activeCtx.requireWebGPU = true;
          activeCtx.forceCPU = false;
        } else {
          activeCtx.requireWebGPU = false;
          activeCtx.forceCPU = true;
        }
      }
      if (wantsWebGPU) {
        if (!activeCtx || activeCtx.isCPU || contextInitiallyForceCPU || !activeCtx.device || !activeCtx.queue) {
          const err = new Error('WebGPU mode requested but no GPU context is available.');
          showError(err.message || String(err));
          throw err;
        }
      }
      const rawTimeSeconds = Number(timeSeconds);
      const effectiveTime =
        Number.isFinite(rawTimeSeconds) ? ((rawTimeSeconds % 1) + 1) % 1 : 0;
      const frameIndexForThisFrame = gpuFrameIndex;
      setSeed(seed);
      if (!activeCtx.profile) {
        activeCtx.profile = {
          webgpu: 0,
          lastGPUTime: 0,
          lastDispatchMs: 0,
          lastCompileMs: 0,
          dynamicScale: 1,
          timestampQueryEnabled: false,
          parityReadback: false,
        };
      } else {
        activeCtx.profile.webgpu = 0;
        activeCtx.profile.lastGPUTime = 0;
        activeCtx.profile.lastDispatchMs = 0;
        activeCtx.profile.lastReadback = null;
        if (!Number.isFinite(activeCtx.profile.dynamicScale)) {
          activeCtx.profile.dynamicScale = 1;
        }
        activeCtx.profile.timestampQueryEnabled = false;
        activeCtx.profile.parityReadback = false;
      }
      applyProfilingOptions(activeCtx);
      const width = canvas.width;
      const height = canvas.height;
      lastCanvasSizeKey = `${width}x${height}`;
      errorBannerEl.style.display = 'none';
      errorBannerEl.textContent = '';

      const presetEvalStart = performance.now();
      const presetTable = PRESETS(presetName);
      random();
      random();
      random();
      const presetObj = new Preset(presetName, presetTable, {}, seed, { debug: false });
      let renderPresetObj = presetObj;
      let renderPresets = presetTable;
      if (!presetObj.is_generator() && presetObj.is_effect()) {
        renderPresets = PRESETS('basic');
        random();
        random();
        random();
        const basePreset = new Preset('basic', renderPresets, {}, seed, { debug: false });
        basePreset.name = `${presetName}-on-basic`;
        const combinedFinal = Array.isArray(basePreset.final_effects)
          ? basePreset.final_effects.slice()
          : [];
        combinedFinal.push(presetObj);
        basePreset.final_effects = combinedFinal;
        renderPresetObj = basePreset;
      }
      presets = renderPresets;
      const presetEvalMs = performance.now() - presetEvalStart;
      const stageSnapshots = gatherStageSnapshots(renderPresetObj);
      const dynamicStageParams = {
        time: effectiveTime,
        speed: 1,
        seed,
        frameIndex: frameIndexForThisFrame,
      };
      for (const stage of stageSnapshots) {
        if (!stage || !stage.params) continue;
        for (const [key, value] of Object.entries(dynamicStageParams)) {
          if (stage.params[key] === undefined) {
            stage.params[key] = value;
          }
        }
      }
      let renderMs = 0;
      let webgpuMs = 0;
      let cpuMs = 0;
      let usedGPU = false;
      let gpuError = null;
      let gpuErrorDisplayed = false;
      let effectiveWidth = width;
      let effectiveHeight = height;

      if (
        wantsWebGPU &&
        activeCtx &&
        !activeCtx.isCPU &&
        activeCtx.device &&
        activeCtx.queue
      ) {
        try {
          const dynamicEnabled = Boolean(activeCtx?.profilingOptions?.dynamicResolution);
          if (dynamicEnabled) {
            const scale = Number.isFinite(activeCtx.profile?.dynamicScale)
              ? Math.max(0.25, Math.min(1, activeCtx.profile.dynamicScale))
              : 1;
            activeCtx.profile.dynamicScale = scale;
            effectiveWidth = Math.max(1, Math.round(width * scale));
            effectiveHeight = Math.max(1, Math.round(height * scale));
          }
          const entry = ensureProgramForPreset(activeCtx, renderPresetObj, effectiveWidth, effectiveHeight);
          if (entry) {
            if (entry.unsupported) {
              const err = new Error('Preset is not supported by WebGPU.');
              gpuError = err;
              if (!entry.notified) {
                showError(err.message);
                gpuErrorDisplayed = true;
                entry.notified = true;
              }
              throw err;
            } else if (entry.program) {
              const support = entry.support || getProgramSupportInfo(entry.program);
              const programPartial = Boolean(support?.hasUnsupported);
              entry.partial = programPartial;
              if (programPartial) {
                const partialError = new Error(
                  'WebGPU preset requires unsupported CPU stages. Disable WebGPU or update the preset to run on the GPU.',
                );
                gpuError = partialError;
                if (!entry.partialNotified) {
                  showError(partialError.message);
                  gpuErrorDisplayed = true;
                  entry.partialNotified = true;
                }
                throw partialError;
              }
              entry.partialNotified = false;
              if (stageSnapshots.length) {
                writeProgramUniforms(entry.program, stageSnapshots, frameIndexForThisFrame);
              }
              const renderStart = performance.now();
              let execResult = null;
              try {
                execResult = await entry.program.execute(activeCtx, {
                  width: effectiveWidth,
                  height: effectiveHeight,
                  time: effectiveTime,
                  frameIndex: frameIndexForThisFrame,
                  seed,
                  present: !programPartial,
                  readback: Boolean(programPartial),
                });
                const producedOutput = Boolean(execResult?.texture || execResult?.readback);
                if (!producedOutput) {
                  const err = new Error('WebGPU execution returned no GPU output.');
                  gpuError = err;
                  throw err;
                }
                usedGPU = true;
              } catch (err) {
                gpuError = err instanceof Error ? err : new Error(String(err));
              }
              if (usedGPU) {
                if (execResult?.queueFlushed !== true && activeCtx.flush) {
                  await activeCtx.flush();
                }
                if (benchmark && activeCtx.queue?.onSubmittedWorkDone) {
                  await activeCtx.queue.onSubmittedWorkDone();
                }
                const totalElapsed = execResult?.totalTimeMs ?? performance.now() - renderStart;
                const dispatchMs = execResult?.dispatchWallMs ?? activeCtx.profile?.lastDispatchMs ?? 0;
                activeCtx.profile.lastDispatchMs = dispatchMs;
                const compileMs = entry.compileMs ?? activeCtx.profile?.lastCompileMs ?? 0;
                activeCtx.profile.lastCompileMs = compileMs;
                webgpuMs = execResult?.gpuTimeMs ?? activeCtx.profile?.lastGPUTime ?? 0;
                if (!Number.isFinite(webgpuMs)) webgpuMs = 0;
                gpuFrameIndex += 1;
                if (execResult?.readback) {
                  activeCtx.profile.lastReadback = execResult.readback;
                }
                if (execResult?.readbackLayout) {
                  activeCtx.profile.lastReadbackLayout = execResult.readbackLayout;
                }
                renderMs = totalElapsed;
                cpuMs = Math.max(0, renderMs - webgpuMs);
                if (dynamicEnabled) {
                  const targetMs = 16;
                  let scale = activeCtx.profile.dynamicScale ?? 1;
                  if (Number.isFinite(webgpuMs)) {
                    if (webgpuMs > targetMs * 1.2) {
                      scale = Math.max(0.3, scale * 0.9);
                    } else if (webgpuMs < targetMs * 0.6) {
                      scale = Math.min(1, scale * 1.05);
                    }
                  }
                  activeCtx.profile.dynamicScale = Math.min(1, Math.max(0.25, scale));
                } else {
                  activeCtx.profile.dynamicScale = 1;
                }
              } else if (gpuError) {
                usedGPU = false;
                if (gpuError && gpuError.name === 'StageValidationError') {
                  const stageLabel = gpuError.stage?.label ?? `stage ${gpuError.stage?.index ?? '?'}`;
                  const bindingSummary = Array.isArray(gpuError.bindings) && gpuError.bindings.length
                    ? gpuError.bindings.map((b) => `b${b.binding}:${b.resourceType}`).join(', ')
                    : 'no bindings reported';
                  const causeMsg = gpuError.cause?.message || gpuError.message || String(gpuError);
                  showError(
                    `WebGPU validation error in ${stageLabel}: ${causeMsg}
Bindings: ${bindingSummary}`,
                  );
                  gpuErrorDisplayed = true;
                } else {
                  showError(gpuError.message || String(gpuError));
                  gpuErrorDisplayed = true;
                }
              }
            }
          }
        } catch (err) {
          const error = err instanceof Error ? err : new Error(String(err));
          gpuError = gpuError || error;
          if (!gpuErrorDisplayed) {
            showError(error.message || String(error));
            gpuErrorDisplayed = true;
          }
        }
      }

      if (!usedGPU) {
        if (wantsWebGPU) {
          const err = gpuError || new Error('WebGPU execution produced no GPU output.');
          if (!gpuErrorDisplayed) {
            showError(err.message || String(err));
            gpuErrorDisplayed = true;
          }
          throw err;
        }
        const previousCtx = activeCtx;
        if (previousCtx && !previousCtx.isCPU) {
          clearProgramCacheForContext(previousCtx);
          const fallbackCanvas = ensureCanvasForBackend('cpu');
          const fallbackCtx = createCPUContext(fallbackCanvas);
          disposeCtx(previousCtx);
          ctx = fallbackCtx;
          activeCtx = fallbackCtx;
          gpuFrameIndex = 0;
        }
        if (activeCtx) {
          activeCtx.forceCPU = true;
          activeCtx.requireWebGPU = false;
        }
        const cpuStart = performance.now();
        try {
          await render(renderPresetObj, seed, {
            width,
            height,
            ctx: activeCtx,
            presets,
            debug: false,
            time: effectiveTime,
            frameIndex: frameIndexForThisFrame,
          });
          if (activeCtx.flush) {
            await activeCtx.flush();
          }
        } catch (e) {
          const errorText = `${e.message || e}\n${e.stack || ''}`;
          showError(errorText);
          throw e;
        }
        if (benchmark && activeCtx.queue && activeCtx.queue.onSubmittedWorkDone) {
          await activeCtx.queue.onSubmittedWorkDone();
        }
        renderMs = performance.now() - cpuStart;
        webgpuMs = activeCtx.profile?.webgpu ?? 0;
        if (!Number.isFinite(webgpuMs)) webgpuMs = 0;
        cpuMs = renderMs;
        effectiveWidth = width;
        effectiveHeight = height;
        if (activeCtx.profile) {
          activeCtx.profile.lastDispatchMs = 0;
          activeCtx.profile.lastCompileMs = activeCtx.profile.lastCompileMs || 0;
        }
        gpuFrameIndex += 1;
      }

      const compileMs = activeCtx.profile?.lastCompileMs ?? 0;
      const dispatchMs = usedGPU ? activeCtx.profile?.lastDispatchMs ?? 0 : 0;
      const dynamicEnabled = Boolean(activeCtx?.profilingOptions?.dynamicResolution);
      const scaleInfo = dynamicEnabled && usedGPU
        ? `scale: ${(activeCtx.profile?.dynamicScale ?? 1).toFixed(2)}x (${effectiveWidth}×${effectiveHeight})`
        : null;
      const modeLabel = usedGPU ? 'webgpu' : 'cpu';
      statusEl.innerHTML = [
        `mode: ${modeLabel}`,
        `eval: ${presetEvalMs.toFixed(2)} ms`,
        `compile: ${compileMs.toFixed(2)} ms`,
        `dispatch: ${dispatchMs.toFixed(2)} ms`,
        `gpu: ${webgpuMs.toFixed(2)} ms`,
        `cpu: ${cpuMs.toFixed(2)} ms`,
        `total: ${renderMs.toFixed(2)} ms`,
        scaleInfo,
        `seed: ${seed}`,
      ]
        .filter(Boolean)
        .join('<br>');
      presetFormulaEl.textContent = presetSource[presetName] || '';
      const evaluatedPreset = serializePreset(renderPresetObj, seed);
      const { settings: _settings, ...evaluatedWithoutSettings } = evaluatedPreset;
      presetEvalEl.textContent = formatPreset(evaluatedWithoutSettings);
    }

    function renderPreset(seed = currentSeed, presetName = currentPreset, options = {}) {
      const opts = options || {};
      const nextSeed = parseSeed(seed);
      currentSeed = nextSeed;
      seedInput.value = nextSeed;
      const usesAnimationTiming = Object.prototype.hasOwnProperty.call(opts, 'timeSeconds');
      if (usesAnimationTiming) {
        animationPendingCount += 1;
      }
      const renderPromise = renderQueue.then(() => draw(nextSeed, presetName, opts.timeSeconds ?? null));
      renderQueue = renderPromise
        .catch(() => {})
        .finally(() => {
          if (usesAnimationTiming) {
            animationPendingCount = Math.max(0, animationPendingCount - 1);
          }
        });
      return renderPromise;
    }

    function renderWithCatch(seed, presetName, options) {
      const promise = renderPreset(seed, presetName, options);
      promise.catch((e) => {
        console.error(e);
      });
      return promise;
    }

    function resetAnimationClock() {
      animationStartTime = 0;
      animationLastFrameTime = 0;
    }

    function stopAnimation() {
      animationRunning = false;
      if (animationFrameHandle !== null) {
        cancelFrame(animationFrameHandle);
        animationFrameHandle = null;
      }
    }

    function updateAnimateToggleAvailability() {
      if (!animateToggle) {
        return;
      }
      const canAnimate = !!webgpuToggle?.checked && !webgpuToggle?.disabled;
      if (!canAnimate && animateToggle.checked) {
        animateToggle.checked = false;
        stopAnimation();
      }
      animateToggle.disabled = !canAnimate;
    }

    updateAnimateToggleAvailability();

    function scheduleAnimationFrame() {
      if (!animationRunning) {
        return;
      }
      animationFrameHandle = requestFrame(handleAnimationFrame);
    }

    function handleAnimationFrame(now) {
      if (!animationRunning) {
        return;
      }
      if (!animationStartTime) {
        animationStartTime = now;
        animationLastFrameTime = 0;
      }
      const elapsedMs = now - animationStartTime;
      const enoughTimeElapsed =
        !animationLastFrameTime || now - animationLastFrameTime >= FRAME_INTERVAL_MS;
      if (animationPendingCount === 0 && enoughTimeElapsed) {
        animationLastFrameTime = now;
        const seconds = elapsedMs / 1000;
        renderWithCatch(currentSeed, currentPreset, { timeSeconds: seconds });
      }
      scheduleAnimationFrame();
    }

    function startAnimation() {
      if (animationRunning) {
        resetAnimationClock();
        return;
      }
      animationRunning = true;
      resetAnimationClock();
      renderWithCatch(currentSeed, currentPreset, { timeSeconds: 0 });
      scheduleAnimationFrame();
    }

    function getManualAnimationOptions() {
      if (!animateToggle || !animateToggle.checked) {
        return undefined;
      }
      resetAnimationClock();
      return { timeSeconds: 0 };
    }

    try {
      await renderPreset(currentSeed, currentPreset);
    } catch (e) {
      console.error(e);
    }

    function applySeedFromInput() {
      const options = getManualAnimationOptions();
      renderWithCatch(seedInput.value, currentPreset, options);
    }

    seedInput.addEventListener('change', applySeedFromInput);
    seedInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        applySeedFromInput();
      }
    });

    document.getElementById('reroll').addEventListener('click', () => {
      const seed = Math.floor(random() * 1e9);
      const options = getManualAnimationOptions();
      renderWithCatch(seed, currentPreset, options);
    });

    presetSelect.addEventListener('change', (e) => {
      currentPreset = e.target.value;
      const seed = Math.floor(random() * 1e9);
      const options = getManualAnimationOptions();
      renderWithCatch(seed, currentPreset, options);
    });

    webgpuToggle.addEventListener('change', async () => {
      const wantsWebGPU = !!webgpuToggle.checked;
      updateAnimateToggleAvailability();
      const manualOptions = getManualAnimationOptions();
      try {
        const initializedWithGPU = await initCtx();
        if (wantsWebGPU && !initializedWithGPU) {
          throw new Error('WebGPU initialization reported success without a GPU context.');
        }
      } catch (e) {
        console.error(e);
        if (wantsWebGPU) {
          webgpuToggle.checked = false;
          updateAnimateToggleAvailability();
          try {
            await initCtx();
          } catch (restoreErr) {
            console.error(restoreErr);
          }
        }
        return;
      }
      try {
        await renderPreset(currentSeed, currentPreset, manualOptions);
      } catch (e) {
        console.error(e);
      }
    });

    if (animateToggle) {
      animateToggle.addEventListener('change', () => {
        if (animateToggle.checked) {
          startAnimation();
        } else {
          stopAnimation();
        }
      });
    }

    document
      .getElementById('randomPreset')
      .addEventListener('click', () => {
        const randomPreset =
          presetNames[Math.floor(random() * presetNames.length)];
        presetSelect.value = randomPreset;
        currentPreset = randomPreset;
        const seed = Math.floor(random() * 1e9);
        const options = getManualAnimationOptions();
        renderWithCatch(seed, currentPreset, options);
      });

    function handleCanvasResize() {
      const sizeKey = `${canvas.width}x${canvas.height}`;
      if (sizeKey === lastCanvasSizeKey) {
        return;
      }
      lastCanvasSizeKey = sizeKey;
      if (!ctx || ctx.isCPU || !currentPreset) {
        return;
      }
      clearProgramCacheForContext(ctx);
      if (typeof ctx.destroy === 'function') {
        try {
          ctx.destroy({ keepLookupTextures: false });
        } catch (err) {
          void err;
        }
      } else if (typeof ctx.dispose === 'function') {
        try {
          ctx.dispose({ keepLookupTextures: false });
        } catch (err) {
          void err;
        }
      }
      const options = getManualAnimationOptions();
      renderWithCatch(currentSeed, currentPreset, options);
    }

    showTab('formula');
  </script>

</body>
</html>
