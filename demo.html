<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Noisemaker JS Demo</title>
  <link rel="icon" href="data:," />
  <style>
    body {
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: row;
      font-family: sans-serif;
      background: #fafafa;
      color: #333;
    }
    #left,
    #right {
      width: 50%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    #right {
      padding-left: 20px;
    }
    canvas {
      border: 1px solid #ccc;
      margin-top: 20px;
      max-width: 512px;
    }
    button {
      margin-left: 10px;
      margin-top: 10px;
      padding: 4px 8px;
      width: 128px;
    }
    select {
      width: 256px;
    }
    #info {
      margin-top: 20px;
    }
    #status {
      font-size: 14px;
      margin-bottom: 10px;
    }
    #tabs {
      margin-bottom: 10px;
    }
    #tabs button {
      margin-right: 5px;
      padding: 4px 8px;
    }
    #tabs button.active {
      font-weight: bold;
    }
    #presetFormula,
    #presetEvaluated {
      background: #f0f0f0;
      padding: 10px;
      overflow: auto;
      max-height: 600px;
      font-size: 12px;
    }
    #presetEvaluated {
      display: none;
    }
  </style>
</head>
<body>
  <div id="left">
    <h1>Noisemaker JS Demo</h1>
    <span>
    <label for="preset">Preset:</label>
    <select id="preset"></select>
    <button id="randomPreset">Random Preset</button>
    <button id="reroll">Re-roll</button>
    <label><input type="checkbox" id="webgpuToggle" checked /> WebGPU</label>
    </span>
    <canvas id="noise" width="512" height="512"></canvas>
  </div>
  <div id="right">
    <div id="info">
      <div id="tabs">
        <button id="tabFormula" class="active">Formula</button>
        <button id="tabEvaluated">Evaluated</button>
      </div>
      <pre id="presetFormula"></pre>
      <pre id="presetEvaluated"></pre>
      <div style="text-align: right">
        <span id="status"></span>
      </div>
    </div>
    <div id="errorBanner" style="display:none;background:#fee;color:#900;padding:10px;width:100%;box-sizing:border-box;white-space:pre-wrap;"></div>
  </div>
  <script type="module">
    import { Context } from './src/context.js';
    import { render, Preset } from './src/composer.js';
    import PRESETS from './src/presets.js';
    import { random, setSeed } from './src/util.js';

    const benchmark = window.location.hash.includes('benchmark');

    const errorBannerEl = document.getElementById('errorBanner');

    function showError(message) {
      errorBannerEl.style.display = 'block';
      errorBannerEl.textContent += (errorBannerEl.textContent ? '\n' : '') + message;
    }

    const origConsoleError = console.error.bind(console);
    console.error = (...args) => {
      origConsoleError(...args);
      showError(args.map(String).join(' '));
    };

    console.warn = (...args) => {
      origConsoleError(...args);
      showError(args.map(String).join(' '));
    };

    window.addEventListener('error', (e) => {
      showError(`${e.message}\n${e.error?.stack || ''}`);
    });

    window.addEventListener('unhandledrejection', (e) => {
      const reason = e.reason;
      showError(reason && reason.stack ? `${reason.message}\n${reason.stack}` : String(reason));
    });

    const canvas = document.getElementById('noise');
    const webgpuToggle = document.getElementById('webgpuToggle');
    if (!navigator.gpu) {
      webgpuToggle.checked = false;
      webgpuToggle.disabled = true;
    }
    let ctx;

    // Attempt to initialize WebGPU. Enable the API in your browser for best
    // performance:
    //   - Chrome/Edge: set the WebGPU flag at chrome://flags or launch with
    //     --enable-unsafe-webgpu
    //   - Safari: Develop > Experimental Features > WebGPU
    //   - Firefox Nightly: dom.webgpu.enabled in about:config
    async function initCtx() {
      ctx = new Context(canvas);
      if (webgpuToggle.checked) {
        try {
          const ok = await ctx.initWebGPU();
          if (!ok) {
            webgpuToggle.checked = false;
            ctx.gpu = null;
            ctx.isCPU = true;
          }
        } catch (e) {
          webgpuToggle.checked = false;
          ctx.gpu = null;
          ctx.isCPU = true;
          showError(e.message || String(e));
        }
      } else {
        ctx.gpu = null;
        ctx.isCPU = true;
      }
      ctx.profile = { webgpu: 0 };
    }

    await initCtx();
    const presetSelect = document.getElementById('preset');
    const statusEl = document.getElementById('status');
    const presetFormulaEl = document.getElementById('presetFormula');
    const presetEvalEl = document.getElementById('presetEvaluated');
    const tabFormulaBtn = document.getElementById('tabFormula');
    const tabEvalBtn = document.getElementById('tabEvaluated');
    let presets = PRESETS();
    const presetNames = Object.keys(presets).filter(
      (name) => !name.startsWith('maybe-')
    );

    // Load the DSL source so that we can display the original recipe
    // text rather than the evaluated JavaScript values.
    const dslSource = await fetch('./dsl/presets.dsl').then((r) => r.text());

    function extractPresetSource(source, name) {
      const escName = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const pattern = new RegExp(`"${escName}"\\s*:\\s*{`);
      const match = pattern.exec(source);
      if (!match) {
        return '';
      }
      let idx = match.index + match[0].length;
      let depth = 1;
      while (idx < source.length && depth > 0) {
        const ch = source[idx++];
        if (ch === '{') {
          depth++;
        } else if (ch === '}') {
          depth--;
        }
      }
      return source.slice(match.index, idx);
    }

    const presetSource = {};
    for (const name of presetNames) {
      presetSource[name] = extractPresetSource(dslSource, name);
    }

    presetNames.sort().forEach((name) => {
      const option = document.createElement('option');
      option.value = name;
      option.textContent = name;
      presetSelect.appendChild(option);
    });

    function formatPreset(obj, indent = 0) {
      const pad = '  '.repeat(indent);
      if (typeof obj === 'function') {
        if (obj.length === 0) {
          try {
            const result = obj();
            if (result && typeof result === 'object') {
              return formatPreset(result, indent);
            }
          } catch (e) {
            // fall back to function's source if invocation fails
          }
        }
        return obj.toString();
      }
      if (obj && typeof obj === 'object') {
        if (Array.isArray(obj)) {
          return (
            '[\n' +
            obj
              .map((v) => pad + '  ' + formatPreset(v, indent + 1))
              .join(',\n') +
            '\n' +
            pad +
            ']'
          );
        }
        return (
          '{\n' +
          Object.entries(obj)
            .map(
              ([k, v]) => pad + '  ' + JSON.stringify(k) + ': ' + formatPreset(v, indent + 1)
            )
            .join(',\n') +
          '\n' +
          pad +
          '}'
        );
      }
      return JSON.stringify(obj);
    }

    function serializePreset(preset) {
      const toPlain = (effects) =>
        effects.map((fn) => ({
          effect: fn.__effectName || fn.name || 'fn',
          ...(fn.__params || {}),
        }));
      return {
        settings: Object.fromEntries(Object.entries(preset.settings)),
        generator: preset.generator,
        octaves: toPlain(preset.octave_effects),
        post: toPlain(preset.post_effects),
        final: toPlain(preset.final_effects),
      };
    }

    function showTab(which) {
      const formula = which === 'formula';
      presetFormulaEl.style.display = formula ? 'block' : 'none';
      presetEvalEl.style.display = formula ? 'none' : 'block';
      tabFormulaBtn.classList.toggle('active', formula);
      tabEvalBtn.classList.toggle('active', !formula);
    }

    tabFormulaBtn.addEventListener('click', () => showTab('formula'));
    tabEvalBtn.addEventListener('click', () => showTab('evaluated'));

    presetSelect.value = 'basic';
    let currentPreset = presetSelect.value;

    async function draw(seed, presetName) {
      setSeed(seed);
      ctx.profile.webgpu = 0;
      presets = PRESETS(presetName);
      const presetObj = new Preset(presetName, presets, {}, seed, { debug: false });
      let start = performance.now();
      errorBannerEl.style.display = 'none';
      errorBannerEl.textContent = '';
      try {
        await render(presetObj, seed, {
          width: canvas.width,
          height: canvas.height,
          ctx,
          presets,
          debug: false,
        });
        if (
          benchmark &&
          ctx.queue &&
          ctx.queue.onSubmittedWorkDone
        ) {
          await ctx.queue.onSubmittedWorkDone();
        }
      } catch (e) {
        const errorText = `${e.message || e}\n${e.stack || ''}`;
        showError(errorText);
        throw e;
      }
      const elapsed = performance.now() - start;
      const webgpuMs = ctx.profile.webgpu;
      const cpuMs = Math.max(0, elapsed - webgpuMs);
      statusEl.textContent =
        `render time: ${elapsed.toFixed(2)} ms | webgpu: ${webgpuMs.toFixed(2)} ms | cpu: ${cpuMs.toFixed(2)} ms | seed: ${seed}`;
      presetFormulaEl.textContent = presetSource[presetName] || '';
      presetEvalEl.textContent = formatPreset(serializePreset(presetObj));
    }

    try {
      await draw(42, currentPreset);
    } catch (e) {
      console.error(e);
    }

    document.getElementById('reroll').addEventListener('click', () => {
      const seed = Math.floor(random() * 1e9);
      draw(seed, currentPreset);
    });

    presetSelect.addEventListener('change', (e) => {
      currentPreset = e.target.value;
      const seed = Math.floor(random() * 1e9);
      draw(seed, currentPreset);
    });

    webgpuToggle.addEventListener('change', async () => {
      await initCtx();
      const seed = Math.floor(random() * 1e9);
      draw(seed, currentPreset);
    });

    document
      .getElementById('randomPreset')
      .addEventListener('click', () => {
        const randomPreset =
          presetNames[Math.floor(random() * presetNames.length)];
        presetSelect.value = randomPreset;
        currentPreset = randomPreset;
        const seed = Math.floor(random() * 1e9);
        draw(seed, currentPreset);
      });

    showTab('formula');
  </script>
</body>
</html>
